<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vibrant Profile</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff4ecd, #6a5cff, #00c9ff);
    }

    .card {
      width: 320px;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      text-align: center;
    }

    .cover {
      height: 100px;
      background: linear-gradient(to right, #ffcc00, #ff4ecd, #ff4d4d);
    }

    .profile-img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid #fff;
      margin-top: -50px;
      object-fit: cover;
    }

    .name {
      font-size: 20px;
      font-weight: bold;
      margin-top: 10px;
    }

    .role {
      font-size: 14px;
      color: gray;
      margin-bottom: 15px;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      margin: 15px 0;
    }

    .stats div {
      text-align: center;
    }

    .stats strong {
      font-size: 18px;
    }

    .buttons {
      margin: 15px 0 20px;
    }

    button {
      padding: 8px 18px;
      margin: 5px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .follow {
      background: #ff4ecd;
      color: white;
    }

    .follow:hover {
      background: #e63bb9;
    }

    .message {
      border: 1px solid #ccc;
      background: white;
    }

    .message:hover {
      background: #f0f0f0;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="cover"></div>

  <img class="profile-img" src="https://i.pravatar.cc/150" alt="Profile">

  <div class="name">Ralph Santolorin</div>
  <div class="role">Front-End Developer</div>

  <div class="stats">
    <div>
      <strong>120</strong>
      <p>Projects</p>
    </div>
    <div>
      <strong>5K</strong>
      <p>Followers</p>
    </div>
    <div>
      <strong>300</strong>
      <p>Following</p>
    </div>
    {% for a in data %}
        <div>{{a.name }}</div>
    {% endfor %}
  </div>

  <div class="buttons">
    <button class="follow">Follow</button>
    <button class="message">Message</button>
  </div>
</div>

</body>
</html>
