<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fb;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: #fff;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    h1 {
      margin-bottom: 20px;
    }

    .section {
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px solid #eee;
    }

    .section h2 {
      margin-bottom: 10px;
      font-size: 18px;
      color: #333;
    }

    .field {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 12px 0;
    }

    .field label {
      font-size: 14px;
      color: #444;
    }

    input, select {
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 50px;
      height: 24px;
    }

    .toggle input {
      display: none;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border-radius: 30px;
      transition: .3s;
    }

    .slider::before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: .3s;
    }

    input:checked + .slider {
      background: #4CAF50;
    }

    input:checked + .slider::before {
      transform: translateX(26px);
    }

    .actions {
      text-align: right;
      margin-top: 20px;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Settings</h1>

    <!-- Profile -->
    <div class="section">
      <h2>Profile</h2>
      <div class="field">
        <label>Name</label>
        <input type="text" placeholder="Your name">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" placeholder="you@example.com">
      </div>
    </div>

    <!-- Preferences -->
    <div class="section">
      <h2>Preferences</h2>
      <div class="field">
        <label>Language</label>
        <select>
          <option>English</option>
          <option>Tagalog</option>
        </select>
      </div>

      <div class="field">
        <label>Dark Mode</label>
        <label class="toggle">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- Notifications -->
    <div class="section">
      <h2>Notifications</h2>

      <div class="field">
        <label>Email Notifications</label>
        <label class="toggle">
          <input type="checkbox" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="field">
        <label>SMS Alerts</label>
        <label class="toggle">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="actions">
      <button>Save Changes</button>
    </div>
  </div>
</body>
</html>
